data_dir = "/home/admin/github/cc-connect/.cc-connect-runtime"
language = "zh"

[log]
level = "info"

[[projects]]
name = "cc-connect"

[projects.agent]
type = "codex"

[projects.agent.options]
work_dir = "/home/admin/github/cc-connect"
mode = "full-auto"

[[projects.platforms]]
type = "feishu"

[projects.platforms.options]
app_id = "your-feishu-app-id"
app_secret = "your-feishu-app-secret"
enable_feishu_card = true
progress_style = "card"
